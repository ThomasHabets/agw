name: Rust

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
    - name: Install dependencies
      run:  sudo apt-get install -y libsodium-dev libax25
    - name: Install nightly
      run: ristup install nightly
    - name: Rustup install nightly clippy
      run: rustup component add --toolchain nightly clippy
    - name: Cargo install
      run: cargo install tickbox cargo-deny
    - name: Build
      run: cargo build --verbose
    - name: Run tests
      run: CLEANUP=true tickbox --dir tickbox/pre-commit --disable-tui
